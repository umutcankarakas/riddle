<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 15</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .hidden-word {
      color: #000000;
      font-size: 1.4em;
      letter-spacing: 0.5em;
      padding: 20px 30px;
      margin: 1.5rem auto;
      outline: none;
      transition: color 0.4s;
      cursor: default;
      display: inline-block;
    }

    .hidden-word:focus {
      color: #d8d8d8;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 15 —</div>

    <div class="clue">
      <p>Put the mouse down.</p>
      <p>Navigate without it.</p>
      <p>&nbsp;</p>
      <p>Every element has a place in the order.</p>
      <p>One of them reveals itself</p>
      <p>only when given full attention.</p>
    </div>

    <div class="hidden-word" tabindex="0">trace</div>

    <div class="field">
      <input type="text" id="answer" placeholder="what appears?" autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: Tab key</div>
  </div>

  <footer>riddlegame<span id="rg-counter" class="rg-counter"></span></footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '313ab5a5fd5c004f0ac6823dae6b811e804fbe4f3632d86feef43f543b788ddb';
    const next = 'grove-8k2q.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      if (await h(val) === H) {
        msg.textContent = 'found.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
  <script>
  (async function(){
    const DB='https://riddlegame-64c99-default-rtdb.firebaseio.com';
    const KEY='level-15';
    const LS='rg_c_'+KEY;
    async function cnt(){try{const r=await fetch(DB+'/counters/'+KEY+'.json');return(await r.json())||0;}catch{return 0;}}
    async function inc(){try{const c=await cnt();await fetch(DB+'/counters/'+KEY+'.json',{method:'PUT',body:JSON.stringify(c+1)});return c+1;}catch{return 0;}}
    const counted=localStorage.getItem(LS);
    const c=counted?await cnt():await inc();
    if(!counted)localStorage.setItem(LS,'1');
    const el=document.getElementById('rg-counter');
    if(el&&c>0)el.textContent=c+' reached this level';
  })();
  </script>
</body>
</html>
