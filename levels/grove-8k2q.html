<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 16</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="page">
    <div class="lvl">— level 16 —</div>

    <div class="clue">
      <p>Grove Street. Six stars rising.</p>
      <p>Cops closing in from every direction.</p>
      <p>&nbsp;</p>
      <p>You remember the word.</p>
      <p>The one that saved you every time.</p>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="type the code..." autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: GTA San Andreas — health &amp; money cheat (PC)</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '02314e09f99f77e14cdbbbbdf73d421cd1bb4a1d628c284444a8457616517a31';
    const next = 'complete-2xr8.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      if (await h(val) === H) {
        msg.textContent = 'cheat activated.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
