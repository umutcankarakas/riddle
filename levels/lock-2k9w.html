<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 18</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .locked-input {
      background: transparent;
      border: 1px solid #1c1c1c;
      color: #888;
      padding: 12px 20px;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 1.1em;
      letter-spacing: 0.5em;
      outline: none;
      text-align: center;
      cursor: not-allowed;
      pointer-events: none;
      width: 180px;
      display: block;
      margin: 1.8rem auto 0.5rem;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 18 —</div>

    <div class="clue">
      <p>The answer is already here.</p>
      <p>Right in front of you.</p>
      <p>You just cannot see it.</p>
      <input class="locked-input" type="password" value="echo"
             disabled readonly autocomplete="off" tabindex="-1">
      <p>Inspect it.</p>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="type what it holds..." autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: inspect the field → value</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '092c79e8f80e559e404bcf660c48f3522b67aba9ff1484b0367e1a4ddef7431d';
    const next = 'tab-5x4z.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      if (await h(val) === H) {
        msg.textContent = 'echo received.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
