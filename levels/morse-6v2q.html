<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 15</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .morse-display {
      font-size: 1.6em;
      letter-spacing: 0.1em;
      color: #fff;
      margin: 2rem 0 0.5rem;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    .morse-sep {
      color: #2a2a2a;
      margin: 0 0.4em;
    }

  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 15 —</div>

    <div class="clue">
      <p>dit dah dit dah.</p>
      <p>Some languages predate computers.</p>

      <p>Decode:</p>
      <div class="morse-display">
        ·−−<span class="morse-sep">/</span>·−<span class="morse-sep">/</span>···−<span class="morse-sep">/</span>·
      </div>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="decode the transmission..." autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: look up morse code</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '4b125ec99a74470517f9f51ac1a70eafa3dbd1ddd4bae409fe59a98ed720a3a4';
    const next = 'crawl-4n8x.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      if (await h(val) === H) {
        msg.textContent = 'transmission complete.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
