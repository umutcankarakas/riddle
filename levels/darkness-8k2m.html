<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 5</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .url-nudge {
      margin-top: 3.5rem;
      font-size: 0.72em;
      color: #1e1e1e;
      letter-spacing: 0.08em;
    }

    .url-nudge:hover {
      color: #2e2e2e;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 5 —</div>

    <div class="clue">
      <p>The box will not save you this time.</p>
      <p>There is no answer to type.</p>
      <p>&nbsp;</p>
      <p>You stand in <strong style="color:#fff">darkness</strong>.</p>
      <p>But darkness has always had an opposite.</p>
      <p>&nbsp;</p>
      <p>The path forward is not found on this page.</p>
      <p>It is found in where you think you are.</p>
    </div>

    <p class="url-nudge">↑ look at the address bar</p>
  </div>

  <footer>riddlegame<span id="rg-counter" class="rg-counter"></span></footer>
  <script>
  (async function(){
    const DB='https://riddlegame-64c99-default-rtdb.firebaseio.com';
    const KEY='level-4';
    const LS='rg_c_'+KEY;
    async function cnt(){try{const r=await fetch(DB+'/counters/'+KEY+'.json');return(await r.json())||0;}catch{return 0;}}
    async function inc(){try{const c=await cnt();await fetch(DB+'/counters/'+KEY+'.json',{method:'PUT',body:JSON.stringify(c+1)});return c+1;}catch{return 0;}}
    const counted=localStorage.getItem(LS);
    const c=counted?await cnt():await inc();
    if(!counted)localStorage.setItem(LS,'1');
    const el=document.getElementById('rg-counter');
    if(el&&c>0)el.textContent=c+' reached this level';
  })();
  </script>
</body>
</html>
