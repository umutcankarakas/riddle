<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Complete</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .check {
      font-size: 2.5em;
      color: #1e8449;
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }

    .recap {
      text-align: center;
      max-width: 500px;
    }

    .recap p {
      color: #505050;
    }

    .recap .milestone {
      color: var(--bright);
    }

    .soon {
      margin-top: 3rem;
      font-size: 0.75em;
      color: #282828;
      letter-spacing: 0.25em;
    }
  </style>
</head>
<body>
  <div class="page recap">
    <div class="check">✓</div>

    <div class="clue">
      <p class="milestone">You made it.</p>
      <p>&nbsp;</p>
      <p>Most people don't get this far.</p>
    </div>

    <p class="soon">more levels coming soon.</p>
  </div>

  <footer>riddlegame<span id="rg-counter" class="rg-counter"></span></footer>
  <script>
  (async function(){
    const DB='https://riddlegame-64c99-default-rtdb.firebaseio.com';
    const KEY='complete';
    const LS='rg_c_'+KEY;
    async function cnt(){try{const r=await fetch(DB+'/counters/'+KEY+'.json');return(await r.json())||0;}catch{return 0;}}
    async function inc(){try{const c=await cnt();await fetch(DB+'/counters/'+KEY+'.json',{method:'PUT',body:JSON.stringify(c+1)});return c+1;}catch{return 0;}}
    const counted=localStorage.getItem(LS);
    const c=counted?await cnt():await inc();
    if(!counted)localStorage.setItem(LS,'1');
    const el=document.getElementById('rg-counter');
    if(el&&c>0)el.textContent=c+' completed the game';
  })();
  </script>
</body>
</html>
