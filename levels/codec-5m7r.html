<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 9</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .strings {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      margin: 1.8rem 0 2.5rem;
      align-items: center;
    }

    .b64 {
      font-size: 0.88em;
      color: #4a4a4a;
      letter-spacing: 0.06em;
      padding: 10px 18px;
      border: 1px solid #141414;
      cursor: text;
      transition: color 0.2s, border-color 0.2s;
      word-break: break-all;
      text-align: center;
      max-width: 420px;
    }

    .b64:hover {
      color: #6a6a6a;
      border-color: #222;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 9 —</div>

    <div class="clue">
      <p>Not everything speaks in plain text.</p>
      <p>These lines mean something.</p>
      <p>One of them holds the answer.</p>

      <div class="strings">
        <div class="b64">dGhpcyBpcyBub3QgaXQ=</div>
        <div class="b64">a2VlcCBsb29raW5n</div>
        <div class="b64">d2hpc3Blcg==</div>
      </div>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="decode and type..." autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <footer>riddlegame<span id="rg-counter" class="rg-counter"></span></footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '1e8244612f62dbbd08418dc7f1e7e830db2da57c5cfc520dff8b2ad786c2e148';
    const next = 'perspective-6w4t.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;

      const hv = await h(val);
      if (hv === H) {
        msg.textContent = 'decoded.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');

        if (hv === 'c1209fbb81801c4f18c681c578414384b337f407a31571dcc844ffea9eaacf1b') {
          msg.textContent = 'correct. that one really isn\'t it.';
        } else if (hv === '0f1020ce9352f30aab81108768bb2a803e52a475449a79594fb5e1667d4156ff') {
          msg.textContent = 'yes, keep looking.';
        } else {
          msg.textContent = 'not quite.';
        }

      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
  <script>
  (async function(){
    const DB='https://riddlegame-64c99-default-rtdb.firebaseio.com';
    const KEY='level-9';
    const LS='rg_c_'+KEY;
    async function cnt(){try{const r=await fetch(DB+'/counters/'+KEY+'.json');return(await r.json())||0;}catch{return 0;}}
    async function inc(){try{const c=await cnt();await fetch(DB+'/counters/'+KEY+'.json',{method:'PUT',body:JSON.stringify(c+1)});return c+1;}catch{return 0;}}
    const counted=localStorage.getItem(LS);
    const c=counted?await cnt():await inc();
    if(!counted)localStorage.setItem(LS,'1');
    const el=document.getElementById('rg-counter');
    if(el&&c>0)el.textContent=c+' reached this level';
  })();
  </script>
</body>
</html>
