<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 13</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .swatch {
      width: 220px;
      height: 100px;
      background-color: #facade;
      margin: 2rem auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 13 —</div>

    <div class="clue">
      <p>Inspect this element.</p>
      <p>Its color has something to say.</p>
      <div class="swatch"></div>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="what does the color say?" autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: inspect → background-color</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = '27be744cdea78aa2c8ce298a57fe7348df202faa15acd823c7d298e48727fbd1';
    const next = 'image-3k7p.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;
      if (await h(val) === H) {
        msg.textContent = 'seen through.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
