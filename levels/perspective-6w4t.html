<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 10</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .clue-flipped {
      transform: rotate(180deg);
      transform-origin: center center;
      text-align: center;
      font-size: 1.05em;
      line-height: 1.95;
      color: var(--bright);
      margin-bottom: 3.5rem;
      max-width: 620px;
    }

    .clue-flipped p + p {
      margin-top: 0.5em;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 10 —</div>

    <div class="clue-flipped">
      <p>Not all puzzles can be solved head-on.</p>
      <p>Some require a change of perspective.</p>
      <p>&nbsp;</p>
      <p>You turned the world around to read this.</p>
      <p>That is your answer.</p>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="what did you just do?" autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: 180°</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const next = 'hover-5r3n.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;

      const hv = await h(val);
      if (hv === '4e448897946ead9e39e8c61c2994b2ada30968ed9d14ac21ebaba710d823db64' ||
          hv === '299bcf54c044b1b5d49a18da354e16f240b695a1f3a55f1e5217595de59fbb3d' ||
          hv === 'bf6e7814c35d7231fb53f7ec0c85745df062bf65e96742df48cbb966b7129b71' ||
          hv === '9b473845f684444f80a26586ae298d2ba491752cc70b893cc653d943b6fa2ac2') {
        msg.textContent = 'perspective shift complete.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
