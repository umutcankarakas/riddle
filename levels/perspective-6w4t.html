<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 10</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .clue-flipped {
      transform: rotate(180deg);
      transform-origin: center center;
      text-align: center;
      font-size: 1.05em;
      line-height: 1.95;
      color: var(--bright);
      margin-bottom: 3.5rem;
      max-width: 620px;
    }

    .clue-flipped p + p {
      margin-top: 0.5em;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="lvl">— level 10 —</div>

    <div class="clue-flipped">
      <p>Not all puzzles can be solved head-on.</p>
      <p>Some require a change of perspective.</p>
      <p>&nbsp;</p>
      <p>You turned the world around to read this.</p>
      <p>That is your answer.</p>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="what did you just do?" autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: 180°</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const next = 'hover-5r3n.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;

      const hv = await h(val);
      if (hv === 'b257c41882a65bfaa81b6db32ef278d01ba2afcf73247f89436f4b413ba11c95' ||
          hv === '912ae0fd8bf81b8f8c2c8d7aa34092f13b463aafe94a2101b58ff01349509c2a' ||
          hv === 'f0e15756508b79e6465a044fb27fc4f0f92723a0eaba261857b40ad48a3d0a56' ||
          hv === 'fe66858aa202b0f8f127d732262bcd97b1092d4f7a1f1cf409763b2e4ab6431b') {
        msg.textContent = 'perspective shift complete.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
