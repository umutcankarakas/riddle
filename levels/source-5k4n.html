<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riddle — Level 3</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="page">
    <div class="lvl">— level 3 —</div>

    <div class="clue">
      <p>Developers see what others cannot.</p>
      <p>The surface is never the whole truth.</p>
      <p>&nbsp;</p>
      <p>Look beneath what you can see.</p>
      <p>The answer lives in the code itself.</p>
    </div>

    <div class="field">
      <input type="text" id="answer" placeholder="look deeper..." autocomplete="off" spellcheck="false">
      <button id="btn">→</button>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hint" id="hint">hint: Ctrl+U</div>
  </div>

  <footer>riddlegame</footer>

  <script>
    async function h(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('rg:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}
    const H = 'cb23c9f4654a2ec1eaee9b0c0b42160026bfc733fc7685b344ecded042561f11';
    const next = 'darkness-8k2m.html';
    let tries = 0;

    const input = document.getElementById('answer');
    const msg   = document.getElementById('msg');
    const hint  = document.getElementById('hint');
    const field = document.querySelector('.field');

    async function check() {
      const val = input.value.trim().toLowerCase();
      if (!val) return;

      if (await h(val) === H) {
        msg.textContent = 'you found it.';
        msg.classList.add('ok');
        setTimeout(() => window.location.href = next, 900);
      } else {
        tries++;
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        msg.textContent = 'not quite.';
        if (tries >= 3) hint.classList.add('visible');
      }
    }

    document.getElementById('btn').addEventListener('click', check);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
    input.focus();
  </script>
</body>
</html>
